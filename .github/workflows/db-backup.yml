name: Sauvegarde quotidienne de la base

on:
  schedule:
    - cron: '0 3 * * *'   # tous les jours a 03h00 UTC
  workflow_dispatch: {}    # lancement manuel possible

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Export de la base (pg_dump) puis chiffrement
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          docker run --rm -e DATABASE_URL postgres:18-alpine \
            pg_dump --format=custom --no-owner --dbname="$DATABASE_URL" > backup.dump
          test -s backup.dump
          gpg --batch --symmetric --cipher-algo AES256 \
            --passphrase "$PASSPHRASE" -o backup.dump.gpg backup.dump
          rm backup.dump
          ls -lh backup.dump.gpg

      - name: Conserver la sauvegarde chiffree (90 jours)
        uses: actions/upload-artifact@v4
        with:
          name: sauvegarde-base-${{ github.run_number }}
          path: backup.dump.gpg
          retention-days: 90
