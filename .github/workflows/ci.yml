name: CI sécurité et qualité

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Tests et package
        working-directory: backend
        run: mvn --batch-mode --update-snapshots verify

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Installation reproductible
        working-directory: frontend
        run: npm ci
      - name: Audit des dépendances de production
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      - name: Vérification TypeScript et build
        working-directory: frontend
        run: npm run build

  container:
    name: Image Docker
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Construire l’image
        run: docker build -t nehemiahlab:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: nehemiahlab:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
