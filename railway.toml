[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Pas de healthcheck bloquant : le deploiement passe en ligne immediatement.
# Si la base est injoignable au demarrage, l'app s'arrete et Railway la relance
# automatiquement (ON_FAILURE) jusqu'a ce que la connexion passe.
restartPolicyType = "ON_FAILURE"
