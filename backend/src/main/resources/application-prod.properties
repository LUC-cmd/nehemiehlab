# Production: aucune valeur sensible par défaut.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Le schéma est validé; les migrations seront gérées par Flyway.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

security.jwt.secret-key=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ORIGINS}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM}
app.mail.otp-from=${MAIL_OTP_FROM:${MAIL_FROM}}

# Stockage objet privé requis en production.
app.storage.endpoint=${STORAGE_ENDPOINT}
app.storage.region=${STORAGE_REGION:auto}
app.storage.bucket=${STORAGE_BUCKET}
app.storage.access-key=${STORAGE_ACCESS_KEY}
app.storage.secret-key=${STORAGE_SECRET_KEY}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.forward-headers-strategy=framework

logging.level.root=WARN
logging.level.com.nehemiahlab.platform=INFO

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false
