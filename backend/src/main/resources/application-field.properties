# Profil « field » : déploiement réel (terrain / pilote) sur Railway ou autre hébergeur.
# Sécurité production, migrations Flyway, stockage local — sans comptes démo ni S3 obligatoire.

spring.datasource.url=jdbc:postgresql://${PGHOST:${DB_HOST}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME}}?sslmode=require
spring.datasource.username=${PGUSER:${DB_USER}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD}}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

security.jwt.secret-key=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ORIGINS}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM}
app.mail.otp-from=${MAIL_OTP_FROM:${MAIL_FROM}}

app.storage.local-root=${STORAGE_LOCAL_ROOT:/tmp/nehemiahlab-uploads}

app.seed.enabled=${APP_SEED_ENABLED:false}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.forward-headers-strategy=framework

logging.level.root=WARN
logging.level.com.nehemiahlab.platform=INFO

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false
