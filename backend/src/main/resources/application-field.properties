# Profil « field » : déploiement réel (terrain / pilote) sur Railway.
# Hibernate crée/met à jour le schéma ; Flyway désactivé (migrations additives seulement).

# Variables DB_* injectées au démarrage depuis DATABASE_URL ou PGHOST (Railway).
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=${DB_SSL_MODE:prefer}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.datasource.hikari.connection-timeout=30000
# 2 min max pour la 1re connexion DB (évite un blocage infini au healthcheck Railway)
spring.datasource.hikari.initialization-fail-timeout=120000

security.jwt.secret-key=${JWT_SECRET}
app.platform.url=${APP_PLATFORM_URL:}
app.cors.allowed-origins=${CORS_ORIGINS:}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM}
app.mail.otp-from=${MAIL_OTP_FROM:${MAIL_FROM}}

app.storage.local-root=${STORAGE_LOCAL_ROOT:/tmp/nehemiahlab-uploads}

app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.director-email=${APP_SEED_DIRECTOR_EMAIL:director@nehemiahlab.com}
app.seed.director-password=${APP_SEED_DIRECTOR_PASSWORD:}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.forward-headers-strategy=framework

logging.level.root=WARN
logging.level.com.nehemiahlab.platform=INFO

# Healthcheck Railway : liveness ne dépend PAS de DB/SMTP (sinon 503 pendant 10 min).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.mail.enabled=false
management.health.db.enabled=false
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState
