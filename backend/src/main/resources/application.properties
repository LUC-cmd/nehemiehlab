# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# Profil local par défaut (SMTP Gmail dans application-local.properties)
# En production: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database connection (valeurs locales dans application-local.properties)
spring.datasource.url=jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:nehemiahlab}}
spring.datasource.username=${PGUSER:${DB_USER:postgres}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — requêtes paramétrées (anti SQL injection)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Uploads (photos, médias, projets Scratch .sb3)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB

# JWT — aucun secret de repli dans le code
security.jwt.secret-key=${JWT_SECRET}
# Expiration: 1 day (86400000 ms)
security.jwt.expiration-time=86400000
# Refresh token expiration: 7 days (604800000 ms)
security.jwt.refresh-expiration-time=604800000

# CORS (origines frontend autorisées, séparées par des virgules)
app.platform.url=${APP_PLATFORM_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4173,http://127.0.0.1:3000,https://*.trycloudflare.com}

# SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:contact@nehemiahlab.com}
# Expéditeur des codes OTP (mot de passe oublié) — peut différer des autres e-mails
app.mail.otp-from=${MAIL_OTP_FROM:${MAIL_FROM:contact@nehemiahlab.com}}
app.mail.reply-to=${MAIL_REPLY_TO:${MAIL_FROM:contact@nehemiahlab.com}}
# Envoi d'emails via l'API HTTP Resend (SMTP sortant bloque par Railway sur le plan Hobby)
app.mail.resend-api-key=${RESEND_API_KEY:}
