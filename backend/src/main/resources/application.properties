# Server
server.port=8080
server.servlet.context-path=/api

# Database connection (les variables DB_* sont injectées par Render en production)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nehemiahlab}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations
security.jwt.secret-key=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
# Expiration: 1 day (86400000 ms)
security.jwt.expiration-time=86400000
# Refresh token expiration: 7 days (604800000 ms)
security.jwt.refresh-expiration-time=604800000
