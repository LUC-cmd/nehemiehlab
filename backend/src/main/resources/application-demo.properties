# Profil « demo » : hébergement gratuit pour présentation (Render + Neon).
# Pas de S3 ni SMTP obligatoires ; stockage local éphémère sur le disque du service.

# Variables DB_* normalisées au démarrage depuis PGHOST ou DATABASE_URL (Railway).
spring.datasource.url=jdbc:postgresql://${PGHOST:${DB_HOST}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME}}?sslmode=require
spring.datasource.username=${PGUSER:${DB_USER}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false

security.jwt.secret-key=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ORIGINS}

# SMTP optionnel en démo locale, mais OBLIGATOIRE sur Render pour que les inscrits reçoivent leurs emails.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:contact@nehemiahlab.com}
app.mail.otp-from=${MAIL_OTP_FROM:${MAIL_FROM:contact@nehemiahlab.com}}

app.storage.local-root=${STORAGE_LOCAL_ROOT:/tmp/nehemiahlab-uploads}

app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.director-email=${APP_SEED_DIRECTOR_EMAIL:director@nehemiahlab.com}
app.seed.director-password=${APP_SEED_DIRECTOR_PASSWORD:password123}
app.seed.demo-password=${APP_SEED_DEMO_PASSWORD:password123}
app.auth.disable-lockout=true

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.forward-headers-strategy=framework

logging.level.root=WARN
logging.level.com.nehemiahlab.platform=INFO

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false
