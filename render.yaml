databases:
  - name: nehemiahlab-db
    databaseName: nehemiahlab
    user: nehemiah

services:
  # 1. Backend Web Service
  - type: web
    name: nehemiahlab-backend
    env: docker
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: nehemiahlab-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: nehemiahlab-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: nehemiahlab-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: nehemiahlab-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: nehemiahlab-db
          property: password

  # 2. Frontend Static Site
  - type: web
    name: nehemiahlab-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Injecte l'URL publique du backend dans le build du frontend
      - key: VITE_API_URL
        fromService:
          type: web
          name: nehemiahlab-backend
          envVarKey: RENDER_EXTERNAL_URL
